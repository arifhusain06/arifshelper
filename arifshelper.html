<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arif's Personal Helper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      color: #e5e7eb;
    }

    body { display: flex; flex-direction: column; }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    .header {
      background: rgba(26, 31, 58, 0.95);
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
      padding: 1rem;
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      overflow-x: auto;
      backdrop-filter: blur(10px);
    }

    .nav-btn {
      padding: 9px 14px;
      background: rgba(255, 255, 255, 0.05);
      color: #9ca3af;
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.3s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-btn:hover {
      border-color: rgba(0, 212, 255, 0.5);
      color: #00d4ff;
      background: rgba(0, 212, 255, 0.05);
    }

    .nav-btn.active {
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      color: #0a0e27;
      border-color: #00d4ff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: rgba(0, 212, 255, 0.3) transparent;
    }

    .content::-webkit-scrollbar {
      width: 6px;
    }

    .content::-webkit-scrollbar-track {
      background: transparent;
    }

    .content::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.3);
      border-radius: 3px;
    }

    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .section-date {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 1.5rem;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      margin: 1.5rem 0 1rem 0;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h3 {
      font-size: 15px;
      font-weight: 600;
      color: #e5e7eb;
      margin: 1.2rem 0 0.8rem 0;
    }

    .card {
      background: rgba(26, 31, 58, 0.6);
      border: 1px solid rgba(0, 212, 255, 0.1);
      border-radius: 12px;
      padding: 1.2rem;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      border-color: rgba(0, 212, 255, 0.3);
      background: rgba(26, 31, 58, 0.8);
    }

    .card.accent-purple {
      border-color: rgba(124, 58, 237, 0.2);
      background: rgba(124, 58, 237, 0.05);
    }

    .card.accent-emerald {
      border-color: rgba(16, 185, 129, 0.2);
      background: rgba(16, 185, 129, 0.05);
    }

    .card.accent-warning {
      border-color: rgba(245, 158, 11, 0.2);
      background: rgba(245, 158, 11, 0.05);
    }

    .button {
      padding: 11px 16px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      border: none;
      border-radius: 8px;
      color: #0a0e27;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      margin-bottom: 8px;
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
    }

    .button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .button.secondary {
      background: rgba(124, 58, 237, 0.2);
      border: 1px solid rgba(124, 58, 237, 0.4);
      color: #a78bfa;
    }

    .button.secondary:hover {
      background: rgba(124, 58, 237, 0.3);
      color: #c4b5fd;
    }

    .button.danger {
      background: rgba(239, 68, 68, 0.2);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: rgba(26, 31, 58, 0.4);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      border-color: rgba(0, 212, 255, 0.4);
      background: rgba(0, 212, 255, 0.05);
    }

    .stat-label {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .stat-unit {
      font-size: 12px;
      color: #6b7280;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      overflow: hidden;
      margin: 8px 0;
      border: 1px solid rgba(0, 212, 255, 0.1);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff 0%, #7c3aed 100%);
      transition: width 0.4s ease;
      border-radius: 4px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: rgba(26, 31, 58, 0.4);
      border: 1px solid rgba(0, 212, 255, 0.1);
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 0.3s ease;
    }

    .checkbox-item:hover {
      border-color: rgba(0, 212, 255, 0.3);
      background: rgba(0, 212, 255, 0.05);
    }

    .checkbox-item input {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #00d4ff;
    }

    .checkbox-item label {
      flex: 1;
      cursor: pointer;
      font-size: 13px;
      color: #e5e7eb;
    }

    .input-field, .textarea-field, .select-field {
      width: 100%;
      padding: 11px 12px;
      background: rgba(26, 31, 58, 0.4);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 8px;
      color: #e5e7eb;
      font-size: 13px;
      font-family: inherit;
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }

    .input-field:focus, .textarea-field:focus, .select-field:focus {
      outline: none;
      border-color: rgba(0, 212, 255, 0.5);
      background: rgba(0, 212, 255, 0.05);
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.1);
    }

    .textarea-field {
      min-height: 100px;
      resize: vertical;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .alert.success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #86efac;
    }

    .alert.warning {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: #fcd34d;
    }

    .alert.danger {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .alert.info {
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      color: #67e8f9;
    }

    .analysis-section {
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .analysis-title {
      font-size: 14px;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .analysis-content {
      font-size: 13px;
      line-height: 1.8;
      color: #d1d5db;
    }

    .analysis-content strong {
      color: #c4b5fd;
    }

    .analysis-section ul, .analysis-section ol {
      margin-left: 20px;
      margin-top: 8px;
    }

    .analysis-section li {
      margin-bottom: 6px;
    }

    .loading {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #00d4ff;
      margin-right: 8px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .mood-selector {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 1rem;
    }

    .mood-btn {
      aspect-ratio: 1;
      border: 2px solid rgba(0, 212, 255, 0.2);
      background: rgba(26, 31, 58, 0.4);
      border-radius: 8px;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .mood-btn:hover {
      border-color: rgba(0, 212, 255, 0.5);
      transform: scale(1.1);
    }

    .mood-btn.selected {
      border-color: #7c3aed;
      background: rgba(124, 58, 237, 0.2);
    }

    .weed-log-item {
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.2);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }

    .weed-log-time {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 6px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 600px) {
      .stat-grid { grid-template-columns: 1fr 1fr; }
      .grid-2 { grid-template-columns: 1fr; }
      h1 { font-size: 24px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="nav-btn active" data-view="dashboard">📊 Dashboard</button>
      <button class="nav-btn" data-view="today">📅 Today</button>
      <button class="nav-btn" data-view="weed">🌿 Weed Log</button>
      <button class="nav-btn" data-view="burnout">⚠️ Burnout</button>
      <button class="nav-btn" data-view="claude">🤖 Claude AI</button>
      <button class="nav-btn" data-view="memory">📔 Memory</button>
      <button class="nav-btn" data-view="settings">⚙️ Settings</button>
    </div>

    <div class="content">
      <div id="dashboard" class="section active"></div>
      <div id="today" class="section"></div>
      <div id="weed" class="section"></div>
      <div id="burnout" class="section"></div>
      <div id="claude" class="section"></div>
      <div id="memory" class="section"></div>
      <div id="settings" class="section"></div>
    </div>
  </div>

  <script>
    const APP_NAME = "Arif's Personal Helper";
    const USER_ID = 'arif-primary';

    const WEEKLY_CRITERIA = {
      prayers: { target: 35, emoji: '🤲', name: '5x Daily Prayer' },
      trainings: { target: 3, emoji: '💪', name: 'Training Sessions' },
      sleep: { target: 49, emoji: '😴', name: 'Sleep Hours (7+/night)' },
      weed: { target: 1, emoji: '🌿', name: 'Weed Uses (max 1x/week)' },
      quran: { target: 1, emoji: '📖', name: 'Quran Study' },
      math: { target: 1, emoji: '📐', name: 'Math Tests' }
    };

    const APP_DATA = (() => {
      const saved = localStorage.getItem(`${APP_NAME}_data`);
      return saved ? JSON.parse(saved) : {
        weeklyData: {},
        weedLog: [],
        burnoutLog: [],
        claudeAnalysis: null,
        lastAnalysisDate: null,
        goals: { weight: 188, mathTests: 0, savings: 0 },
        preferences: { cloudSync: true, apiKey: '' }
      };
    })();

    function save() {
      localStorage.setItem(`${APP_NAME}_data`, JSON.stringify(APP_DATA));
    }

    function getCurrentWeek() {
      const now = new Date();
      const weekNum = Math.ceil((now.getDate() + new Date(now.getFullYear(), now.getMonth(), 1).getDay()) / 7);
      const key = `${now.getFullYear()}-W${weekNum}`;
      if (!APP_DATA.weeklyData[key]) {
        APP_DATA.weeklyData[key] = {
          prayers: 0, trainings: 0, sleep: 0, weed: 0, quran: 0, math: 0,
          dailyBreakdown: {}, moods: []
        };
      }
      return { key, data: APP_DATA.weeklyData[key] };
    }

    function getWeekStatus() {
      const week = getCurrentWeek().data;
      const status = {};
      for (let [key, criterion] of Object.entries(WEEKLY_CRITERIA)) {
        const current = week[key] || 0;
        const target = criterion.target;
        status[key] = {
          current, target,
          remaining: Math.max(0, target - current),
          percent: Math.round((current / target) * 100),
          onTrack: current >= target
        };
      }
      return status;
    }

    function renderDashboard() {
      const status = getWeekStatus();
      const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
      const hasAnalysis = APP_DATA.claudeAnalysis && APP_DATA.lastAnalysisDate;

      let html = `
        <h1>✨ Your Week</h1>
        <div class="section-date">${today}</div>

        ${hasAnalysis ? `
          <div class="alert info">
            🤖 Claude analysis available! Check the Claude AI tab for personalized insights.
          </div>
        ` : ''}

        <h2>📊 This Week's Health</h2>
        <div class="stat-grid">
          ${Object.entries(status).map(([key, data]) => `
            <div class="stat-card">
              <div class="stat-label">${WEEKLY_CRITERIA[key].name}</div>
              <div class="stat-value">${data.current}</div>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${Math.min(data.percent, 100)}%;"></div>
              </div>
              <div class="stat-unit">${data.target} target</div>
            </div>
          `).join('')}
        </div>

        <h2>⚡ Priority This Week</h2>
        ${Object.entries(status).filter(([_, d]) => !d.onTrack).length > 0 ? `
          <div class="card accent-warning">
            ${Object.entries(status).filter(([_, d]) => !d.onTrack).map(([key, data]) => `
              <div style="margin-bottom: 8px; font-size: 13px;">
                <strong>${WEEKLY_CRITERIA[key].name}</strong>: Need ${data.remaining} more
              </div>
            `).join('')}
          </div>
        ` : `
          <div class="card accent-emerald">
            All weekly goals are on track! 🎉
          </div>
        `}

        ${hasAnalysis ? `
          <button class="button secondary" onclick="switchView('claude')">📈 View Claude Insights</button>
        ` : ''}
      `;

      document.getElementById('dashboard').innerHTML = html;
    }

    function renderToday() {
      const status = getWeekStatus();
      const daysLeft = Math.max(1, 7 - new Date().getDay());

      let html = `
        <h1>📅 Today's Quota</h1>
        <div class="section-date">Days left this week: ${daysLeft}</div>

        <h2>🎯 Must Complete Today</h2>
      `;

      for (let [key, data] of Object.entries(status)) {
        if (data.remaining > 0) {
          const dailyNeed = Math.ceil(data.remaining / daysLeft);
          html += `
            <div class="checkbox-item">
              <input type="checkbox" class="today-task" data-key="${key}">
              <label><strong>${WEEKLY_CRITERIA[key].name}</strong><br>Need ${dailyNeed} today to hit ${data.target} by Sunday</label>
            </div>
          `;
        }
      }

      html += `
        <h2 style="margin-top: 1.5rem;">💭 How are you feeling today?</h2>
        <div class="mood-selector" id="moodSelector">
          <button class="mood-btn" data-mood="1" title="Terrible">😞</button>
          <button class="mood-btn" data-mood="2" title="Bad">😟</button>
          <button class="mood-btn" data-mood="3" title="Okay">😐</button>
          <button class="mood-btn" data-mood="4" title="Good">🙂</button>
          <button class="mood-btn" data-mood="5" title="Amazing">🤩</button>
        </div>

        <button class="button" onclick="saveTodayProgress()">Save Progress</button>
      `;

      document.getElementById('today').innerHTML = html;

      document.querySelectorAll('.mood-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
          this.classList.add('selected');
          document.getElementById('today').dataset.mood = this.dataset.mood;
        });
      });
    }

    function renderWeedLog() {
      const today = new Date().toISOString().split('T')[0];
      const todayLog = APP_DATA.weedLog.filter(log => log.date === today);
      const thisWeek = APP_DATA.weedLog.filter(log => {
        const logDate = new Date(log.date);
        const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
        return logDate >= weekAgo;
      });

      let allowance = "Check your mood and week use";
      if (thisWeek.length >= 1) {
        allowance = "You've used weed this week. Recommend: skip today, prioritize sleep.";
      } else if (APP_DATA.weedLog.length > 0) {
        allowance = "1 use allowed today (medical integration, evening only)";
      }

      let html = `
        <h1>🌿 Weed Medical Log</h1>
        <div class="section-date">Flexible medical tracking per doctor recommendations</div>

        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label">Uses This Week</div>
            <div class="stat-value">${thisWeek.length}</div>
            <div class="stat-unit">Max 1-2 per week</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Today's Use</div>
            <div class="stat-value">${todayLog.length}</div>
            <div class="stat-unit">${todayLog.length > 0 ? 'Used' : 'Not yet'}</div>
          </div>
        </div>

        <div class="alert info">
          📌 ${allowance}
        </div>

        <h2>📝 Log a Use</h2>
        <div class="card">
          <label>Time:</label>
          <input type="time" class="input-field" id="weedTime" value="${new Date().toTimeString().slice(0, 5)}">

          <label>Mood Before (1-10):</label>
          <input type="range" class="input-field" id="moodBefore" min="1" max="10" value="5">
          <div style="font-size: 12px; color: #9ca3af; text-align: center;">You feel: <span id="moodBeforeDisplay">5</span>/10</div>

          <label>Type:</label>
          <select class="select-field" id="weedType">
            <option>Sativa (energizing)</option>
            <option>Indica (calming)</option>
            <option>Hybrid</option>
          </select>

          <label>Amount:</label>
          <select class="select-field" id="weedAmount">
            <option>Micro-dose</option>
            <option>Small dose</option>
            <option>Regular dose</option>
          </select>

          <label>Notes:</label>
          <textarea class="textarea-field" id="weedNotes" placeholder="Effect on ADHD/OCD/anxiety? Sleep? Focus?"></textarea>

          <button class="button secondary" onclick="logWeedUse()">Log This Use</button>
        </div>

        <h2>📊 Recent Log</h2>
        ${APP_DATA.weedLog.sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 10).map(log => `
          <div class="weed-log-item">
            <div class="weed-log-time">${new Date(log.date + ' ' + log.time).toLocaleDateString()}, ${log.time}</div>
            <div style="font-size: 13px; color: #d1d5db;">
              <strong>${log.type}</strong> • ${log.amount} | Mood: ${log.moodBefore}/10
            </div>
            ${log.notes ? `<div style="font-size: 12px; color: #9ca3af; margin-top: 6px;">"${log.notes}"</div>` : ''}
          </div>
        `).join('')}
      `;

      document.getElementById('weed').innerHTML = html;

      document.getElementById('moodBefore').addEventListener('input', function() {
        document.getElementById('moodBeforeDisplay').textContent = this.value;
      });
    }

    function renderBurnout() {
      let html = `
        <h1>⚠️ Burnout Prevention</h1>

        <h2>🛡️ Prevention Protocols</h2>

        <div class="card">
          <h3>Protocol 1: Sleep Crash</h3>
          <p style="font-size: 13px; color: #d1d5db; margin: 8px 0;">If sleep < 6 hours:</p>
          <ul style="font-size: 13px; color: #d1d5db; margin-left: 20px; margin-top: 8px;">
            <li>10pm: Cold water (5 min)</li>
            <li>10:15pm: Dim lights, melatonin</li>
            <li>10:30pm: Isha prayer</li>
            <li>10:45pm: 4-7-8 breathing</li>
            <li>11pm: Sleep, no phone</li>
          </ul>
        </div>

        <div class="card">
          <h3>Protocol 2: Decision Paralysis</h3>
          <p style="font-size: 13px; color: #d1d5db; margin: 8px 0;">When stuck:</p>
          <ul style="font-size: 13px; color: #d1d5db; margin-left: 20px; margin-top: 8px;">
            <li>Pick ONE task</li>
            <li>Set timer 2 minutes</li>
            <li>Just do it</li>
            <li>After: continue or break</li>
          </ul>
        </div>

        <div class="card">
          <h3>Protocol 3: Sensory Overload</h3>
          <p style="font-size: 13px; color: #d1d5db; margin: 8px 0;">When sounds/lights too intense:</p>
          <ul style="font-size: 13px; color: #d1d5db; margin-left: 20px; margin-top: 8px;">
            <li>Mute phone</li>
            <li>Dim lights or close eyes</li>
            <li>Lo-fi music only</li>
            <li>15-30 min rest</li>
          </ul>
        </div>

        <h2>📋 Log Signal</h2>
        <div class="card">
          <label style="font-size: 13px; color: #d1d5db;">
            <input type="checkbox" id="burnoutSleep"> Can't sleep
          </label>
          <label style="font-size: 13px; color: #d1d5db;">
            <input type="checkbox" id="burnoutParalysis"> Decision paralysis
          </label>
          <label style="font-size: 13px; color: #d1d5db;">
            <input type="checkbox" id="burnoutSensory"> Sensory overload
          </label>
          <button class="button" style="margin-top: 1rem;" onclick="logBurnout()">Log Signal</button>
        </div>
      `;

      document.getElementById('burnout').innerHTML = html;
    }

    function renderClaude() {
      const hasApi = APP_DATA.preferences.apiKey && APP_DATA.preferences.apiKey.trim();
      const hasAnalysis = APP_DATA.claudeAnalysis && APP_DATA.lastAnalysisDate;

      let html = `
        <h1>🤖 Claude AI Analysis</h1>
        <div class="section-date">Weekly personalized insights based on your data</div>
      `;

      if (!hasApi) {
        html += `
          <div class="alert warning">
            ⚠️ API key not set. Go to Settings and add your Claude API key to enable AI analysis.
          </div>
        `;
      } else {
        html += `
          <div class="alert success">
            ✓ API key configured. Ready to generate insights.
          </div>

          <button class="button" onclick="generateClaudeAnalysis()" style="background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);">
            🤖 Generate Weekly Analysis
          </button>
        `;

        if (hasAnalysis) {
          html += `
            <div style="margin-top: 1.5rem; font-size: 12px; color: #9ca3af;">
              Last analysis: ${new Date(APP_DATA.lastAnalysisDate).toLocaleDateString()}
            </div>

            <div class="analysis-section" id="claudeAnalysisContent">
              <div class="analysis-title">Claude's Weekly Insights</div>
              <div class="analysis-content">${APP_DATA.claudeAnalysis.replace(/\n/g, '<br>')}</div>
            </div>
          `;
        }
      }

      document.getElementById('claude').innerHTML = html;
    }

    async function generateClaudeAnalysis() {
      const apiKey = APP_DATA.preferences.apiKey;
      if (!apiKey) {
        alert('API key not set. Go to Settings.');
        return;
      }

      const btn = event.target;
      btn.disabled = true;
      btn.textContent = `${btn.querySelector('.loading') ? '' : '<span class="loading"></span>'}Analyzing...`;

      try {
        const week = getCurrentWeek().data;
        const weedLogs = APP_DATA.weedLog.filter(log => {
          const logDate = new Date(log.date);
          const weekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
          return logDate >= weekAgo;
        });

        const prompt = `You are analyzing personal data for Arif (20, ADHD/OCD/ASD, Muslim, takes medical cannabis per doctor recommendation).

WEEKLY DATA:
- Prayers: ${week.prayers}/35 (5x daily)
- Training: ${week.trainings}/3
- Sleep: ${week.sleep}/49 hours
- Weed uses: ${week.weed} (max 1-2/week, flexible medical)
- Quran study: ${week.quran}/1
- Math tests: ${week.math}/1

WEED LOG (${weedLogs.length} uses):
${weedLogs.map(log => `- ${log.date}: ${log.type}, ${log.amount}, mood before: ${log.moodBefore}/10, notes: ${log.notes || 'N/A'}`).join('\n')}

BURNOUT SIGNALS: ${APP_DATA.burnoutLog.length > 0 ? JSON.stringify(APP_DATA.burnoutLog.slice(-3)) : 'None logged'}

Provide:
1. PATTERNS: What does the data show about weed's effect on mood/ADHD/focus/sleep?
2. RECOMMENDATIONS: Based on patterns, what should change?
3. PREDICTIONS: What's likely to happen if they continue current trajectory?
4. BURNOUT RISK: Signs of burnout, what to watch for?
5. WINS: What's working? What to celebrate?

Be specific, use actual data. Be honest but supportive. Remember this is medical integration, not judgment.`;

        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey
          },
          body: JSON.stringify({
            model: 'claude-opus-4-6',
            max_tokens: 1500,
            messages: [{
              role: 'user',
              content: prompt
            }]
          })
        });

        if (!response.ok) {
          throw new Error(`API error: ${response.status}`);
        }

        const data = await response.json();
        const analysis = data.content[0].text;

        APP_DATA.claudeAnalysis = analysis;
        APP_DATA.lastAnalysisDate = new Date().toISOString();
        save();

        renderClaude();
        alert('Analysis complete!');
      } catch (error) {
        alert(`Error: ${error.message}`);
        console.error(error);
      } finally {
        btn.disabled = false;
        btn.textContent = '🤖 Generate Weekly Analysis';
      }
    }

    function renderMemory() {
      let html = `
        <h1>📔 Memory Journal</h1>

        <h2>Add Entry</h2>
        <div class="card">
          <textarea class="textarea-field" id="memoryText" placeholder="Wins, lessons, struggles, progress..."></textarea>
          <button class="button" onclick="addMemory()">Save Memory</button>
        </div>

        <h2>Recent Entries</h2>
      `;

      if (APP_DATA.journal && APP_DATA.journal.length > 0) {
        APP_DATA.journal.sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 20).forEach(entry => {
          html += `
            <div class="card">
              <div style="font-size: 12px; color: #9ca3af; margin-bottom: 8px;">${new Date(entry.date).toLocaleDateString()}</div>
              <div style="font-size: 13px; color: #e5e7eb;">${entry.text}</div>
            </div>
          `;
        });
      } else {
        html += `<div class="card">No entries yet.</div>`;
      }

      document.getElementById('memory').innerHTML = html;
    }

    function renderSettings() {
      let html = `
        <h1>⚙️ Settings</h1>

        <h2>🤖 Claude API Key</h2>
        <div class="card">
          <label>Paste your API key here:</label>
          <input type="password" class="input-field" id="apiKeyInput" value="${APP_DATA.preferences.apiKey || ''}" placeholder="sk-...">
          <div style="font-size: 12px; color: #9ca3af; margin-bottom: 12px;">
            Your key is stored locally only. Never sent anywhere except to Claude API.
          </div>
          <button class="button secondary" onclick="saveApiKey()">Save API Key</button>
        </div>

        <h2>☁️ Cloud Sync</h2>
        <div class="card">
          <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
            <input type="checkbox" id="cloudSyncToggle" ${APP_DATA.preferences.cloudSync ? 'checked' : ''}>
            <span style="font-size: 13px;">Auto-sync across devices</span>
          </label>
          <button class="button secondary" style="margin-top: 12px;" onclick="toggleCloudSync()">Save Preference</button>
        </div>

        <h2>💾 Data</h2>
        <div class="card">
          <button class="button secondary" onclick="exportData()">📥 Export Data</button>
          <button class="button danger" style="margin-top: 8px;" onclick="clearData()">🗑️ Clear All Data</button>
        </div>
      `;

      document.getElementById('settings').innerHTML = html;
    }

    function switchView(view) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

      document.querySelector(`[data-view="${view}"]`).classList.add('active');
      document.getElementById(view).classList.add('active');

      if (view === 'dashboard') renderDashboard();
      else if (view === 'today') renderToday();
      else if (view === 'weed') renderWeedLog();
      else if (view === 'burnout') renderBurnout();
      else if (view === 'claude') renderClaude();
      else if (view === 'memory') renderMemory();
      else if (view === 'settings') renderSettings();
    }

    function logWeedUse() {
      const time = document.getElementById('weedTime').value;
      const moodBefore = document.getElementById('moodBefore').value;
      const type = document.getElementById('weedType').value;
      const amount = document.getElementById('weedAmount').value;
      const notes = document.getElementById('weedNotes').value;

      APP_DATA.weedLog.push({
        date: new Date().toISOString().split('T')[0],
        time, moodBefore: parseInt(moodBefore), type, amount, notes
      });

      getCurrentWeek().data.weed++;
      save();
      renderWeedLog();
      alert('Logged!');
    }

    function saveTodayProgress() {
      alert('Progress saved.');
    }

    function logBurnout() {
      APP_DATA.burnoutLog.push({
        date: new Date().toISOString(),
        signals: {
          sleep: document.getElementById('burnoutSleep').checked,
          paralysis: document.getElementById('burnoutParalysis').checked,
          sensory: document.getElementById('burnoutSensory').checked
        }
      });
      save();
      alert('Signal logged.');
    }

    function addMemory() {
      const text = document.getElementById('memoryText').value;
      if (text.trim()) {
        if (!APP_DATA.journal) APP_DATA.journal = [];
        APP_DATA.journal.push({ date: new Date().toISOString(), text });
        save();
        renderMemory();
        document.getElementById('memoryText').value = '';
      }
    }

    function saveApiKey() {
      const key = document.getElementById('apiKeyInput').value;
      if (key.trim()) {
        APP_DATA.preferences.apiKey = key;
        save();
        alert('API key saved!');
        renderSettings();
      }
    }

    function toggleCloudSync() {
      APP_DATA.preferences.cloudSync = document.getElementById('cloudSyncToggle').checked;
      save();
      alert('Preference saved.');
    }

    function exportData() {
      const dataStr = JSON.stringify(APP_DATA, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `arifshelper_backup_${new Date().toISOString().split('T')[0]}.json`;
      link.click();
    }

    function clearData() {
      if (confirm('Clear ALL data? Cannot undo.')) {
        localStorage.clear();
        location.reload();
      }
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => switchView(btn.dataset.view));
    });

    renderDashboard();
  </script>
</body>
</html>
