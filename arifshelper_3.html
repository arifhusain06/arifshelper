<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arif's Personal Helper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      color: #e5e7eb;
    }

    body { display: flex; flex-direction: column; }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    .header {
      background: rgba(26, 31, 58, 0.95);
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
      padding: 1rem;
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      overflow-x: auto;
      backdrop-filter: blur(10px);
    }

    .nav-btn {
      padding: 9px 14px;
      background: rgba(255, 255, 255, 0.05);
      color: #9ca3af;
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.3s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-btn:hover {
      border-color: rgba(0, 212, 255, 0.5);
      color: #00d4ff;
      background: rgba(0, 212, 255, 0.05);
    }

    .nav-btn.active {
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      color: #0a0e27;
      border-color: #00d4ff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .section-date {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 1.5rem;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      margin: 1.5rem 0 1rem 0;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card {
      background: rgba(26, 31, 58, 0.6);
      border: 1px solid rgba(0, 212, 255, 0.1);
      border-radius: 12px;
      padding: 1.2rem;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .schedule-block {
      background: rgba(26, 31, 58, 0.6);
      border-left: 4px solid #00d4ff;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
    }

    .schedule-block.current {
      border-left-color: #10b981;
      background: rgba(16, 185, 129, 0.1);
      box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
    }

    .schedule-block.upcoming {
      border-left-color: #f59e0b;
    }

    .schedule-time {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .schedule-title {
      font-size: 16px;
      font-weight: 600;
      color: #e5e7eb;
      margin-bottom: 6px;
    }

    .schedule-action {
      font-size: 13px;
      color: #d1d5db;
      line-height: 1.5;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: rgba(26, 31, 58, 0.4);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-label {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      overflow: hidden;
      margin: 8px 0;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff 0%, #7c3aed 100%);
      transition: width 0.4s ease;
    }

    .button {
      padding: 11px 16px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      border: none;
      border-radius: 8px;
      color: #0a0e27;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      margin-bottom: 8px;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
    }

    .input-field {
      width: 100%;
      padding: 11px 12px;
      background: rgba(26, 31, 58, 0.4);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 8px;
      color: #e5e7eb;
      font-size: 13px;
      margin-bottom: 12px;
    }

    .input-field:focus {
      outline: none;
      border-color: rgba(0, 212, 255, 0.5);
      background: rgba(0, 212, 255, 0.05);
    }

    .daily-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .daily-input-field {
      padding: 8px 10px;
      background: rgba(26, 31, 58, 0.4);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 6px;
      color: #e5e7eb;
      font-size: 12px;
    }

    @media (max-width: 600px) {
      .stat-grid { grid-template-columns: 1fr 1fr; }
      h1 { font-size: 24px; }
      .daily-inputs { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="nav-btn active" data-view="dashboard">📊 Dashboard</button>
      <button class="nav-btn" data-view="today">📅 Today</button>
      <button class="nav-btn" data-view="adjust">🔄 Adjust</button>
      <button class="nav-btn" data-view="settings">⚙️ Settings</button>
    </div>

    <div class="content">
      <div id="dashboard" class="section active"></div>
      <div id="today" class="section"></div>
      <div id="adjust" class="section"></div>
      <div id="settings" class="section"></div>
    </div>
  </div>

  <script>
    const WEEKLY_CRITERIA = {
      prayers: { target: 35, emoji: '🤲' },
      trainings: { target: 3, emoji: '💪' },
      sleep: { target: 49, emoji: '😴' },
      weed: { target: 1, emoji: '🌿' },
      quran: { target: 1, emoji: '📖' },
      math: { target: 1, emoji: '📐' }
    };

    const DAILY_SCHEDULE = [
      { time: '5:37 AM', title: '🤲 Fajr Prayer + Quran', action: 'Wake up, pray Fajr, read Quran for 15-30 min' },
      { time: '8:00 AM', title: '🏢 Work', action: 'Start work at the shop (Mon/Tue/Thu/Fri)' },
      { time: '10:30 AM', title: '🍎 Snack Break', action: 'Take a snack, listen to music' },
      { time: '1:00 PM', title: '🤲 Dhuhr Prayer + Lunch', action: 'Pray Dhuhr, eat lunch' },
      { time: '5:00 PM', title: '🤲 Asr Prayer', action: 'Pray Asr (at shop or combine with Maghrib)' },
      { time: '6:30 PM', title: '📵 Phone Lock', action: 'Put phone away for personal time' },
      { time: '7:00 PM', title: '💪 Training', action: 'Fight/Push/Pull/Legs cycle (50-60 min)' },
      { time: '9:02 PM', title: '🤲 Maghrib Prayer', action: 'Pray Maghrib' },
      { time: '10:00 PM', title: '🧘 Reflection', action: 'Wind down, reflect on the day' },
      { time: '10:53 PM', title: '🤲 Isha Prayer + Sleep', action: 'Pray Isha, go to bed' }
    ];

    const DAYS = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];

    const APP_DATA = (() => {
      const saved = localStorage.getItem('arifshelper_full');
      return saved ? JSON.parse(saved) : {
        weeklyData: {},
        dailyData: {}
      };
    })();

    function save() {
      localStorage.setItem('arifshelper_full', JSON.stringify(APP_DATA));
    }

    function getCurrentWeek() {
      const now = new Date();
      const weekNum = Math.ceil((now.getDate() + new Date(now.getFullYear(), now.getMonth(), 1).getDay()) / 7);
      const key = `${now.getFullYear()}-W${weekNum}`;
      if (!APP_DATA.weeklyData[key]) {
        APP_DATA.weeklyData[key] = {
          prayers: 0, trainings: 0, sleep: 0, weed: 0, quran: 0, math: 0
        };
      }
      return { key, data: APP_DATA.weeklyData[key] };
    }

    function getWeekStatus() {
      const week = getCurrentWeek().data;
      const status = {};
      for (let [key, criterion] of Object.entries(WEEKLY_CRITERIA)) {
        const current = week[key] || 0;
        const target = criterion.target;
        status[key] = {
          current, target,
          remaining: Math.max(0, target - current),
          percent: Math.round((current / target) * 100)
        };
      }
      return status;
    }

    function renderDashboard() {
      const status = getWeekStatus();
      const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

      let html = `
        <h1>✨ Your Week</h1>
        <div class="section-date">${today}</div>

        <h2>📊 Weekly Progress</h2>
        <div class="stat-grid">
          ${Object.entries(status).map(([key, data]) => `
            <div class="stat-card">
              <div class="stat-label">${key.toUpperCase()}</div>
              <div class="stat-value">${data.current}</div>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${Math.min(data.percent, 100)}%;"></div>
              </div>
              <div style="font-size: 11px; color: #9ca3af;">${data.target} target</div>
            </div>
          `).join('')}
        </div>

        <button class="button" onclick="switchView('today')">📅 See Today's Schedule</button>
      `;

      document.getElementById('dashboard').innerHTML = html;
    }

    function renderToday() {
      const now = new Date();
      const currentHour = now.getHours();
      const currentMin = now.getMinutes();
      const currentTimeInMin = currentHour * 60 + currentMin;
      const status = getWeekStatus();
      const daysLeft = Math.max(1, 7 - now.getDay());

      let html = `
        <h1>📅 Today's Schedule</h1>
        <div class="section-date">${now.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}</div>

        <h2>⏰ Your Day</h2>
      `;

      DAILY_SCHEDULE.forEach(slot => {
        const [slotHour, slotMin] = slot.time.split(':')[0].split(':').map(Number);
        const slotTimeInMin = slotHour * 60 + (slotMin || 0);
        
        let blockClass = 'schedule-block';
        if (Math.abs(currentTimeInMin - slotTimeInMin) < 90) blockClass += ' current';
        else if (slotTimeInMin > currentTimeInMin) blockClass += ' upcoming';

        html += `
          <div class="${blockClass}">
            <div class="schedule-time">${slot.time}</div>
            <div class="schedule-title">${slot.title}</div>
            <div class="schedule-action">${slot.action}</div>
          </div>
        `;
      });

      html += `
        <h2>📈 Daily Targets</h2>
        <div class="card">
          <div style="font-size: 13px; line-height: 1.8;">
            🤲 Prayers: Need ${Math.ceil(status.prayers.remaining / daysLeft)} today<br>
            💪 Training: ${status.trainings.remaining > 0 ? `Need ${Math.ceil(status.trainings.remaining / daysLeft)}` : 'On track'}<br>
            😴 Sleep: Need ${Math.ceil(status.sleep.remaining / daysLeft)} hours<br>
            🌿 Weed: ${status.weed.remaining > 0 ? 'Max 1x this week' : 'On track'}<br>
            📖 Quran: ${status.quran.remaining > 0 ? 'Must do this week' : 'Done'}<br>
            📐 Math: ${status.math.remaining > 0 ? 'Must do this week' : 'Done'}
          </div>
        </div>
      `;

      document.getElementById('today').innerHTML = html;
    }

    function renderAdjust() {
      const week = getCurrentWeek().data;
      const daysLeft = 7 - new Date().getDay();

      let html = `
        <h1>🔄 Adjust This Week</h1>
        <div class="section-date">Update what you've actually done. Week recalculates.</div>

        <h2>📊 Current Week Numbers</h2>
      `;

      for (let [key, criterion] of Object.entries(WEEKLY_CRITERIA)) {
        const current = week[key] || 0;
        html += `
          <div class="card">
            <label style="font-size: 12px; color: #9ca3af;">${criterion.emoji} ${key.toUpperCase()}</label>
            <input type="number" class="input-field" id="adjust-${key}" value="${current}" min="0" onchange="saveAdjustment()">
          </div>
        `;
      }

      const totals = {};
      for (let key of Object.keys(WEEKLY_CRITERIA)) {
        totals[key] = Object.values(APP_DATA.weeklyData).reduce((sum, week) => sum + (week[key] || 0), 0);
      }

      html += `
        <h2>📈 Daily Targets (${daysLeft} days left)</h2>
      `;

      for (let [key, criterion] of Object.entries(WEEKLY_CRITERIA)) {
        const current = parseInt(document.getElementById(`adjust-${key}`)?.value || week[key] || 0);
        const needed = Math.max(0, criterion.target - current);
        const perDay = daysLeft > 0 ? Math.ceil(needed / daysLeft) : 0;

        html += `
          <div class="card">
            <div style="display: flex; justify-content: space-between;">
              <span>${criterion.emoji} ${key}</span>
              <span style="color: ${perDay > 0 ? '#f59e0b' : '#2ecc71'}; font-weight: 600;">${perDay}/day</span>
            </div>
          </div>
        `;
      }

      document.getElementById('adjust').innerHTML = html;
    }

    function saveAdjustment() {
      const week = getCurrentWeek().data;
      for (let key of Object.keys(WEEKLY_CRITERIA)) {
        const val = parseInt(document.getElementById(`adjust-${key}`).value) || 0;
        week[key] = val;
      }
      save();
      renderAdjust();
    }

    function renderSettings() {
      let html = `
        <h1>⚙️ Settings</h1>
        <div class="card">
          <button class="button" style="background: rgba(239, 68, 68, 0.2); color: #fca5a5;" onclick="clearData()">🗑️ Clear All Data</button>
        </div>
      `;

      document.getElementById('settings').innerHTML = html;
    }

    function switchView(view) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

      document.querySelector(`[data-view="${view}"]`).classList.add('active');
      document.getElementById(view).classList.add('active');

      if (view === 'dashboard') renderDashboard();
      else if (view === 'today') renderToday();
      else if (view === 'adjust') renderAdjust();
      else if (view === 'settings') renderSettings();
    }

    function clearData() {
      if (confirm('Clear ALL data?')) {
        localStorage.clear();
        location.reload();
      }
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => switchView(btn.dataset.view));
    });

    renderDashboard();
  </script>
</body>
</html>
