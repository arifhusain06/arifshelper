<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arif's Personal Helper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
      color: #e5e7eb;
    }

    body { display: flex; flex-direction: column; }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }

    .header {
      background: rgba(26, 31, 58, 0.95);
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
      padding: 1rem;
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
      overflow-x: auto;
      backdrop-filter: blur(10px);
    }

    .nav-btn {
      padding: 9px 14px;
      background: rgba(255, 255, 255, 0.05);
      color: #9ca3af;
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.3s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav-btn:hover {
      border-color: rgba(0, 212, 255, 0.5);
      color: #00d4ff;
      background: rgba(0, 212, 255, 0.05);
    }

    .nav-btn.active {
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      color: #0a0e27;
      border-color: #00d4ff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .section { display: none; }
    .section.active { display: block; animation: fadeIn 0.3s ease; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .section-date {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 1.5rem;
    }

    h2 {
      font-size: 14px;
      font-weight: 600;
      margin: 1.5rem 0 1rem 0;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    h3 {
      font-size: 15px;
      font-weight: 600;
      color: #e5e7eb;
      margin: 1.2rem 0 0.8rem 0;
    }

    .card {
      background: rgba(26, 31, 58, 0.6);
      border: 1px solid rgba(0, 212, 255, 0.1);
      border-radius: 12px;
      padding: 1.2rem;
      margin-bottom: 1rem;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
    }

    .button {
      padding: 11px 16px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099cc 100%);
      border: none;
      border-radius: 8px;
      color: #0a0e27;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
      margin-bottom: 8px;
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.2);
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background: rgba(26, 31, 58, 0.4);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-label {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #00d4ff 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 4px;
      overflow: hidden;
      margin: 8px 0;
      border: 1px solid rgba(0, 212, 255, 0.1);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff 0%, #7c3aed 100%);
      transition: width 0.4s ease;
      border-radius: 4px;
    }

    .input-field {
      width: 100%;
      padding: 11px 12px;
      background: rgba(26, 31, 58, 0.4);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 8px;
      color: #e5e7eb;
      font-size: 13px;
      font-family: inherit;
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: rgba(0, 212, 255, 0.5);
      background: rgba(0, 212, 255, 0.05);
    }

    .daily-box {
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.2);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.2rem;
    }

    .daily-day {
      font-size: 13px;
      font-weight: 600;
      color: #c4b5fd;
      margin-bottom: 1rem;
      text-transform: capitalize;
    }

    .daily-inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .daily-input-group {
      display: flex;
      flex-direction: column;
    }

    .daily-input-label {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .daily-input-field {
      padding: 8px 10px;
      background: rgba(26, 31, 58, 0.4);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 6px;
      color: #e5e7eb;
      font-size: 12px;
      transition: all 0.3s ease;
    }

    .daily-input-field:focus {
      outline: none;
      border-color: rgba(0, 212, 255, 0.5);
      background: rgba(0, 212, 255, 0.05);
    }

    .daily-target {
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 8px;
      padding: 12px;
      margin-top: 1rem;
      font-size: 12px;
      color: #67e8f9;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 1rem;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      color: #67e8f9;
    }

    @media (max-width: 600px) {
      .stat-grid { grid-template-columns: 1fr 1fr; }
      h1 { font-size: 24px; }
      .daily-inputs { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <button class="nav-btn active" data-view="dashboard">📊 Dashboard</button>
      <button class="nav-btn" data-view="daily-adjust">📅 Daily Adjust</button>
      <button class="nav-btn" data-view="week-view">📈 Week View</button>
      <button class="nav-btn" data-view="weed">🌿 Weed</button>
      <button class="nav-btn" data-view="burnout">⚠️ Burnout</button>
      <button class="nav-btn" data-view="memory">📔 Memory</button>
      <button class="nav-btn" data-view="settings">⚙️ Settings</button>
    </div>

    <div class="content">
      <div id="dashboard" class="section active"></div>
      <div id="daily-adjust" class="section"></div>
      <div id="week-view" class="section"></div>
      <div id="weed" class="section"></div>
      <div id="burnout" class="section"></div>
      <div id="memory" class="section"></div>
      <div id="settings" class="section"></div>
    </div>
  </div>

  <script>
    const WEEKLY_CRITERIA = {
      prayers: { target: 35, emoji: '🤲', name: 'Prayers' },
      trainings: { target: 3, emoji: '💪', name: 'Training' },
      sleep: { target: 49, emoji: '😴', name: 'Sleep (hrs)' },
      weed: { target: 1, emoji: '🌿', name: 'Weed' },
      quran: { target: 1, emoji: '📖', name: 'Quran' },
      math: { target: 1, emoji: '📐', name: 'Math' }
    };

    const DAYS = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];

    const APP_DATA = (() => {
      const saved = localStorage.getItem('arifshelper_data');
      return saved ? JSON.parse(saved) : {
        dailyData: {},
        weedLog: [],
        memory: [],
        goals: {}
      };
    })();

    function save() {
      localStorage.setItem('arifshelper_data', JSON.stringify(APP_DATA));
    }

    function getCurrentWeekData() {
      const now = new Date();
      const weekNum = Math.ceil((now.getDate() + new Date(now.getFullYear(), now.getMonth(), 1).getDay()) / 7);
      const weekKey = `${now.getFullYear()}-W${weekNum}`;
      
      const weekData = {};
      DAYS.forEach(day => {
        const dayKey = `${weekKey}-${day}`;
        if (!APP_DATA.dailyData[dayKey]) {
          APP_DATA.dailyData[dayKey] = {
            prayers: 0, trainings: 0, sleep: 0, weed: 0, quran: 0, math: 0
          };
        }
        weekData[day] = APP_DATA.dailyData[dayKey];
      });
      
      return { weekKey, weekData };
    }

    function calculateWeeklyTotals(weekData) {
      const totals = {};
      for (let key of Object.keys(WEEKLY_CRITERIA)) {
        totals[key] = Object.values(weekData).reduce((sum, day) => sum + (day[key] || 0), 0);
      }
      return totals;
    }

    function renderDashboard() {
      const { weekData } = getCurrentWeekData();
      const totals = calculateWeeklyTotals(weekData);
      const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

      let html = `
        <h1>✨ Your Week</h1>
        <div class="section-date">${today}</div>

        <h2>📊 Weekly Totals</h2>
        <div class="stat-grid">
          ${Object.entries(WEEKLY_CRITERIA).map(([key, criterion]) => {
            const current = totals[key] || 0;
            const percent = Math.round((current / criterion.target) * 100);
            return `
              <div class="stat-card">
                <div class="stat-label">${criterion.name}</div>
                <div class="stat-value">${current}</div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width: ${Math.min(percent, 100)}%;"></div>
                </div>
                <div class="stat-unit">${criterion.target} target</div>
              </div>
            `;
          }).join('')}
        </div>

        <button class="button" onclick="switchView('daily-adjust')">📅 Adjust Today</button>
      `;

      document.getElementById('dashboard').innerHTML = html;
    }

    function renderDailyAdjust() {
      const { weekKey, weekData } = getCurrentWeekData();
      const today = new Date();
      const currentDayIndex = today.getDay();
      const totals = calculateWeeklyTotals(weekData);

      let html = `
        <h1>📅 Daily Adjustment</h1>
        <div class="section-date">Adjust each day. Week recalculates automatically.</div>

        <div class="alert">
          Input what you actually completed each day. Daily targets for remaining days update automatically.
        </div>

        <h2>Input Your Days</h2>
      `;

      DAYS.forEach((day, dayIndex) => {
        const dayData = weekData[day];
        const isPast = dayIndex < currentDayIndex;
        const isToday = dayIndex === currentDayIndex;
        const dayDisplay = day.charAt(0).toUpperCase() + day.slice(1);
        
        html += `
          <div class="daily-box">
            <div class="daily-day">${dayDisplay} ${isToday ? '(Today)' : isPast ? '(Done)' : '(Upcoming)'}</div>
            <div class="daily-inputs">
              <div class="daily-input-group">
                <div class="daily-input-label">🤲 Prayers</div>
                <input type="number" class="daily-input-field" data-day="${day}" data-key="prayers" value="${dayData.prayers}" min="0" onchange="updateDailyData()">
              </div>
              <div class="daily-input-group">
                <div class="daily-input-label">💪 Training</div>
                <input type="number" class="daily-input-field" data-day="${day}" data-key="trainings" value="${dayData.trainings}" min="0" onchange="updateDailyData()">
              </div>
              <div class="daily-input-group">
                <div class="daily-input-label">😴 Sleep</div>
                <input type="number" class="daily-input-field" data-day="${day}" data-key="sleep" value="${dayData.sleep}" min="0" onchange="updateDailyData()">
              </div>
              <div class="daily-input-group">
                <div class="daily-input-label">🌿 Weed</div>
                <input type="number" class="daily-input-field" data-day="${day}" data-key="weed" value="${dayData.weed}" min="0" onchange="updateDailyData()">
              </div>
              <div class="daily-input-group">
                <div class="daily-input-label">📖 Quran</div>
                <input type="number" class="daily-input-field" data-day="${day}" data-key="quran" value="${dayData.quran}" min="0" onchange="updateDailyData()">
              </div>
              <div class="daily-input-group">
                <div class="daily-input-label">📐 Math</div>
                <input type="number" class="daily-input-field" data-day="${day}" data-key="math" value="${dayData.math}" min="0" onchange="updateDailyData()">
              </div>
            </div>
          </div>
        `;
      });

      html += `
        <h2>Remaining Daily Targets</h2>
      `;

      // Calculate targets for remaining days
      const daysRemaining = Math.max(1, 7 - currentDayIndex);
      for (let [key, criterion] of Object.entries(WEEKLY_CRITERIA)) {
        const current = totals[key] || 0;
        const needed = Math.max(0, criterion.target - current);
        const perDay = daysRemaining > 0 ? Math.ceil(needed / daysRemaining) : 0;

        html += `
          <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
              <div>
                <strong>${criterion.emoji} ${criterion.name}</strong><br>
                <span style="font-size: 12px; color: #9ca3af;">Need ${needed} in ${daysRemaining} days</span>
              </div>
              <div style="text-align: right; color: ${perDay > 0 ? '#f59e0b' : '#2ecc71'}; font-weight: 600;">
                ${perDay}/day
              </div>
            </div>
          </div>
        `;
      }

      document.getElementById('daily-adjust').innerHTML = html;
    }

    function updateDailyData() {
      const inputs = document.querySelectorAll('.daily-input-field');
      
      inputs.forEach(input => {
        const day = input.dataset.day;
        const key = input.dataset.key;
        const value = parseInt(input.value) || 0;
        
        const { weekKey, weekData } = getCurrentWeekData();
        const dayKey = `${weekKey}-${day}`;
        
        if (!APP_DATA.dailyData[dayKey]) {
          APP_DATA.dailyData[dayKey] = {
            prayers: 0, trainings: 0, sleep: 0, weed: 0, quran: 0, math: 0
          };
        }
        
        APP_DATA.dailyData[dayKey][key] = value;
      });
      
      save();
      renderDailyAdjust();
    }

    function renderWeekView() {
      const { weekData } = getCurrentWeekData();
      const totals = calculateWeeklyTotals(weekData);

      let html = `
        <h1>📈 Week Overview</h1>

        <h2>Daily Breakdown</h2>
      `;

      DAYS.forEach(day => {
        const dayData = weekData[day];
        const dayDisplay = day.charAt(0).toUpperCase() + day.slice(1);

        html += `
          <div class="card">
            <h3>${dayDisplay}</h3>
            <div style="font-size: 13px; color: #d1d5db; line-height: 1.8;">
              🤲 Prayers: ${dayData.prayers} | 💪 Training: ${dayData.trainings}<br>
              😴 Sleep: ${dayData.sleep}h | 🌿 Weed: ${dayData.weed} | 📖 Quran: ${dayData.quran} | 📐 Math: ${dayData.math}
            </div>
          </div>
        `;
      });

      document.getElementById('week-view').innerHTML = html;
    }

    function renderWeed() {
      let html = `
        <h1>🌿 Weed Log</h1>
        <div class="card">
          <p style="font-size: 13px; color: #d1d5db;">Log section coming soon.</p>
        </div>
      `;

      document.getElementById('weed').innerHTML = html;
    }

    function renderBurnout() {
      let html = `
        <h1>⚠️ Burnout Prevention</h1>
        <div class="card">
          <p style="font-size: 13px; color: #d1d5db;">Burnout section coming soon.</p>
        </div>
      `;

      document.getElementById('burnout').innerHTML = html;
    }

    function renderMemory() {
      let html = `
        <h1>📔 Memory</h1>
        <div class="card">
          <p style="font-size: 13px; color: #d1d5db;">Memory section coming soon.</p>
        </div>
      `;

      document.getElementById('memory').innerHTML = html;
    }

    function renderSettings() {
      let html = `
        <h1>⚙️ Settings</h1>
        <div class="card">
          <button class="button" onclick="clearAllData()">Clear All Data</button>
        </div>
      `;

      document.getElementById('settings').innerHTML = html;
    }

    function switchView(view) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));

      document.querySelector(`[data-view="${view}"]`).classList.add('active');
      document.getElementById(view).classList.add('active');

      if (view === 'dashboard') renderDashboard();
      else if (view === 'daily-adjust') renderDailyAdjust();
      else if (view === 'week-view') renderWeekView();
      else if (view === 'weed') renderWeed();
      else if (view === 'burnout') renderBurnout();
      else if (view === 'memory') renderMemory();
      else if (view === 'settings') renderSettings();
    }

    function clearAllData() {
      if (confirm('Clear all data?')) {
        localStorage.clear();
        location.reload();
      }
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => switchView(btn.dataset.view));
    });

    renderDashboard();
  </script>
</body>
</html>
